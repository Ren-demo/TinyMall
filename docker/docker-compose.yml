services:
  # MySQL 配置
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "mall"
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql

  # Redis 配置
  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data

  # MongoDB 配置
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: "123456"
    ports:
      - "27017:27017"
    volumes:
      - ./mongo/data:/data/db

  # RabbitMQ 配置 (包含管理后台)
  rabbitmq:
    image: rabbitmq:3.8-management
    container_name: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: "123456"
    ports:
      - "5672:5672"   # 消息队列端口
      - "15672:15672" # 管理界面端口
    volumes:
      - ./rabbitmq/data:/var/lib/rabbitmq

  # MinIO 配置
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: "12345678"
    ports:
      - "9000:9000"   # API 端口
      - "9001:9001"   # 控制台端口
    volumes:
      - ./minio/data:/data
    command: server /data --console-address ":9001"

 